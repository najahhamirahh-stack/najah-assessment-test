<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="card login-card">
    <div class="card-header text-center py-3 bg-light border-bottom">
      <h5 class="mb-0 text-secondary">Sign in to your dashboard</h5>
    </div>
    
    <div class="card-body p-4">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group mb-4">
          <input 
            type="email" 
            id="email"
            name="email"
            formControlName="email" 
            class="form-control custom-input" 
            placeholder="Username">
        </div>

        <div class="form-group mb-4">
          <input 
            type="password" 
            id="password"
            name="password"
            formControlName="password" 
            class="form-control custom-input" 
            placeholder="Password">
        </div>

        <div class="text-left">
          <button type="submit" class="btn btn-signin font-weight-bold px-4">
            SIGN IN
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
