<nav class="navbar navbar-dark bg-dark px-4 py-2">
  <span class="navbar-brand mb-0 h1 text-secondary" style="font-size: 1.2rem;">Dashboard</span>
  <button class="btn btn-link text-light sign-out-btn" (click)="onLogout()">
    Sign Out <i class="fa fa-sign-out"></i>
  </button>
</nav>

<div class="container-fluid p-5 bg-light-gray">
  <h3 class="mb-4 font-weight-normal">Overview</h3>
  
  <div class="row mb-5">
    <div class="col-md-6">
      <div class="card chart-card h-100">
        <div class="card-header">Card Title</div>
        <div class="card-body d-flex align-items-center">
          <div id="donutChartDiv" style="width: 100%; height: 300px;"></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card chart-card h-100">
        <div class="card-header">Card Title</div>
        <div class="card-body">
          <div id="barChartDiv" style="width: 100%; height: 300px;"></div>
        </div>
      </div>
    </div>
  </div>

  <h3 class="mb-4 font-weight-normal">User List</h3>
  <div class="table-responsive bg-white">
    <table class="table table-bordered mb-0 text-center">
      <thead>
        <tr>
          <th>#</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>User Name</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users; let i = index">
          <td class="bg-light">{{ i + 1 }}</td>
          <td>{{ user.firstName }}</td>
          <td>{{ user.lastName }}</td>
          <td>@{{ user.username }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
